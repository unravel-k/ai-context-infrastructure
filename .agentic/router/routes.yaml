version: 1

defaults:
  axiom_order:
    - universal
    - domain
    - job
    - skill
    - project
    - current_user_instruction

  conflict_policy:
    default: higher_scope_wins
    user_instruction_can_override:
      - job
      - skill
      - project
    user_instruction_cannot_override:
      - safety
      - security
      - privacy
      - destructive_actions_without_confirmation

routes:
  for-and-against:
    description: Research a topic from opposing viewpoints. Query for/against independently, synthesize with source attribution and consensus/contrarian classification.
    priority: 80
    intent: analysis

    triggers:
      - for and against
      - for against
      - bull vs bear
      - bullish bearish
      - pros and cons
      - both sides
      - dual perspective
      - opposing views
      - two sided
      - balanced view
      - long short thesis

    negative_triggers:
      - fix application bug
      - refactor production code
      - deploy

    axiom_stack:
      - .agentic/axioms/universal.md
      - .agentic/axioms/domains/research-analysis.md
      - .agentic/axioms/skills/for-and-against.md

    skill: .agentic/skills/for-and-against/skill.md

    required_context:
      inspect_first:
        - .agentic/skills/for-and-against/

    allowed_tools:
      - read
      - grep
      - write
      - edit
      - bash_test
      - web_search
      - web_fetch
      - mcp_tools

    disallowed_tools:
      - production_deploy
      - destructive_shell
      - git_push

    verification:
      required: true
      strategy: checklist
      preferred:
        - Cross-check source attributions present
        - Confirm for and against queries were run independently

    output_contract: .agentic/skills/for-and-against/output.md

    guardrails:
      - .agentic/guardrails/dangerous-actions.md

    doctrine_update:
      propose_after_completion: false
      auto_apply: false

  multi-views:
    description: Research and compare multiple topics side-by-side. Runs for-and-against per topic, then synthesizes cross-comparison with shared themes, divergences, and qualitative ranking.
    priority: 85
    intent: analysis

    triggers:
      - multi views
      - multi asset
      - compare
      - comparison
      - side by side
      - versus
      - vs
      - asset battle
      - pick between
      - which is better

    negative_triggers:
      - fix application bug
      - refactor production code
      - deploy

    axiom_stack:
      - .agentic/axioms/universal.md
      - .agentic/axioms/domains/research-analysis.md
      - .agentic/axioms/skills/multi-views.md

    skill: .agentic/skills/multi-views/skill.md

    required_context:
      inspect_first:
        - .agentic/skills/multi-views/
        - .agentic/skills/for-and-against/

    allowed_tools:
      - read
      - grep
      - write
      - edit
      - bash_test
      - web_search
      - web_fetch
      - mcp_tools

    disallowed_tools:
      - production_deploy
      - destructive_shell
      - git_push

    verification:
      required: true
      strategy: checklist
      preferred:
        - Confirm for-and-against ran independently per topic
        - Cross-check cross-cutting themes are supported by per-topic data
        - Verify ranking includes direct reasons per topic

    output_contract: .agentic/skills/multi-views/output.md

    guardrails:
      - .agentic/guardrails/dangerous-actions.md

    doctrine_update:
      propose_after_completion: false
      auto_apply: false

  verify-citations:
    description: Verify that citations and references in any text point to real, matching sources. Catch hallucinated URLs, broken links, misattributed claims, and fabricated references.
    priority: 70
    intent: verification

    triggers:
      - verify citations
      - check citations
      - citation check
      - check references
      - verify references
      - fact check
      - source check
      - are these sources real

    negative_triggers:
      - fix application bug
      - refactor production code
      - deploy

    axiom_stack:
      - .agentic/axioms/universal.md
      - .agentic/axioms/domains/research-analysis.md
      - .agentic/axioms/skills/verify-citations.md

    skill: .agentic/skills/verify-citations/skill.md

    required_context:
      inspect_first:
        - .agentic/skills/verify-citations/

    allowed_tools:
      - read
      - grep
      - write
      - edit
      - bash_test
      - web_search
      - web_fetch
      - mcp_tools

    disallowed_tools:
      - production_deploy
      - destructive_shell
      - git_push

    verification:
      required: true
      strategy: checklist
      preferred:
        - Confirm every citation was classified (verified/broken/hallucinated/misattributed/unverifiable)
        - Confirm claims were preserved when possible

    output_contract: .agentic/skills/verify-citations/output.md

    guardrails:
      - .agentic/guardrails/dangerous-actions.md

    doctrine_update:
      propose_after_completion: false
      auto_apply: false
